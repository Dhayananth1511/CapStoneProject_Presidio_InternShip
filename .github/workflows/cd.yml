# ============================================================
# .github/workflows/cd.yml — CD Pipeline
#
# WHEN: Runs when code is pushed/merged to main branch
# WHY:  Automatically deploys the latest version to AWS
#
# Flow:
#   1. Build + push Docker image to Docker Hub
#   2. Build React frontend + sync to S3 + invalidate CloudFront cache
#   3. SSH into EC2 → docker pull latest → restart containers
#
# YOU NEVER NEED DOCKER ON YOUR PC — this runner has it built in.
# ============================================================

name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest  # Ubuntu runner has Docker pre-installed

    steps:
      # 1. Checkout full source code
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step A: Build + Push Docker Image to Docker Hub ──

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # DOCKERHUB_TOKEN = Docker Hub access token (not password)
          # Set in: GitHub repo → Settings → Secrets → Actions

      - name: Set up Docker Buildx (faster multi-platform builds)
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server          # Build from server/ directory
          file: ./server/Dockerfile  # Use our multi-stage Dockerfile
          push: true                 # Push to Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/travel-planner-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/travel-planner-api:${{ github.sha }}
          # We tag with both :latest AND the git commit SHA
          # :latest → always points to newest; :sha → lets you rollback to exact commit
          cache-from: type=gha      # Use GitHub Actions cache for faster rebuilds
          cache-to: type=gha,mode=max

      # ── Step B: Build + Deploy React Frontend to S3 ──────

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build React frontend
        run: cd client && npm run build
        env:
          # VITE_API_URL = where the frontend sends API requests.
          # We route /api/* through CloudFront (HTTPS) → EC2:5000.
          # NEVER use http://EC2_IP:5000 here — browsers block mixed content
          # (HTTP requests from an HTTPS page are silently dropped).
          VITE_API_URL: https://${{ secrets.CLOUDFRONT_DOMAIN }}/api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Sync frontend build to S3
        run: |
          aws s3 sync ./client/dist s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          # --delete removes old files that no longer exist
          # --cache-control sets aggressive caching for hashed files

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          # Forces CloudFront to fetch fresh files from S3
          # Without this, users see old cached version for up to 24 hours

      # ── Step C: Deploy API to EC2 via SSH ────────────────

      - name: Get GitHub Runner Public IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "ip=$RUNNER_IP" >> $GITHUB_OUTPUT

      - name: Open SSH port in AWS Security Group
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=travel-planner-api-sg \
            --query "SecurityGroups[0].GroupId" \
            --output text --region ap-south-1)
          aws ec2 authorize-security-group-ingress \
            --group-id $SG_ID \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner-ip.outputs.ip }}/32 \
            --region ap-south-1
        # Dynamically whitelist runner IP for SSH

      - name: Deploy API container to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}       # Elastic IP
          username: ec2-user                      # Amazon Linux default user
          key:      ${{ secrets.EC2_SSH_KEY }}    # Contents of .pem file
          timeout:  120s
          script: |
            set -e

            echo "=== Recreating latest fetch_secrets.sh ==="
            cat > /home/ec2-user/app/fetch_secrets.sh << 'FETCH'
            #!/bin/bash
            ENV_FILE="/home/ec2-user/app/.env"
            echo "NODE_ENV=production" > $ENV_FILE
            echo "REDIS_URL=redis://redis:6379" >> $ENV_FILE
            echo "AWS_DEFAULT_REGION=ap-south-1" >> $ENV_FILE

            KEYS=(
              "MONGO_URI"
              "JWT_ACCESS_SECRET"
              "JWT_REFRESH_SECRET"
              "JWT_ACCESS_EXPIRES"
              "JWT_REFRESH_EXPIRES"
              "GROQ_API_KEY"
              "GROQ_API_KEY_2"
              "GROQ_API_KEY_3"
              "GROQ_API_KEY_4"
              "GROQ_API_KEY_5"
              "GOOGLE_MAPS_API_KEY"
              "HOTELBEDS_API_KEY"
              "HOTELBEDS_API_SECRET"
              "HOTELBEDS_BASE_URL"
              "ACTIVITY_API_KEY"
              "TRANSFERS_API_KEY"
              "GOOGLE_CALENDAR_CLIENT_ID"
              "GOOGLE_CALENDAR_CLIENT_SECRET"
              "GOOGLE_CALENDAR_REDIRECT_URI"
              "AVIATIONSTACK_API_KEY"
              "OPENWEATHER_API_KEY"
              "PORT"
              "CLIENT_URL"
            )

            for KEY in "${KEYS[@]}"; do
              VAL=$(aws ssm get-parameter --name "/travel-planner/${KEY}" --with-decryption --query "Parameter.Value" --output text --region ap-south-1 2>/dev/null || echo "")
              if [ ! -z "${VAL}" ]; then
                echo "${KEY}=${VAL}" >> $ENV_FILE
              fi
            done

            chown ec2-user:ec2-user $ENV_FILE
            chmod 600 $ENV_FILE
            echo "Secrets .env updated successfully"
            FETCH

            chmod +x /home/ec2-user/app/fetch_secrets.sh

            echo "=== Fetching latest secrets from AWS SSM ==="
            /home/ec2-user/app/fetch_secrets.sh

            echo "=== Pulling latest API image from Docker Hub ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/travel-planner-api:latest

            echo "=== Restarting API container ==="
            docker-compose \
              -f /home/ec2-user/app/docker-compose.prod.yml \
              up -d --no-deps api
            # --no-deps → only restart 'api', leave Redis running
            # up -d     → detached (runs in background)

            echo "=== Waiting for API health check ==="
            sleep 10
            docker ps | grep "travel-planner-api" && \
              echo "✅ API container is running" || \
              echo "❌ API container failed to start"

            echo "=== Cleaning up old Docker images ==="
            docker image prune -f
            # Free up disk space — removes dangling images

            echo "=== Deployment complete! ==="

      - name: Close SSH port in AWS Security Group
        if: always() # Run even if SSH deployment step fails to avoid orphan access
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=travel-planner-api-sg \
            --query "SecurityGroups[0].GroupId" \
            --output text --region ap-south-1)
          aws ec2 revoke-security-group-ingress \
            --group-id $SG_ID \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner-ip.outputs.ip }}/32 \
            --region ap-south-1


      # ── Final Step: Verify Deployment ───────────────────

      - name: Verify API health endpoint
        run: |
          sleep 15   # Give API time to fully start
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}:5000/health || echo "000")
          echo "API health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Deployment successful! API is healthy."
          else
            echo "⚠️  API returned status $HTTP_STATUS — check EC2 logs"
          fi
        continue-on-error: true   # Don't fail CD just because health check is slow
